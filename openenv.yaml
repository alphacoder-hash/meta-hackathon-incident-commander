name: incident_commander
version: "1.0.0"
description: >
  A DevOps incident response environment. An AI agent triages alerts,
  parses logs, traces dependencies, diagnoses root causes, and restores services
  across an 8-service microservices architecture.
author: "Meta Hackathon Submission"
license: MIT

tasks:
  - id: single_service_crash
    description: "A single service has gone down. Find and fix it."
    difficulty: easy
    max_steps: 10
  - id: cascading_failure
    description: "A cascading failure is propagating across services."
    difficulty: medium
    max_steps: 15
  - id: bad_deployment
    description: "A bad deployment broke something. Rollback before customers notice."
    difficulty: medium_hard
    max_steps: 15
  - id: silent_degradation
    description: "Latency is creeping up but nothing looks obviously broken."
    difficulty: hard
    max_steps: 20

action_space:
  - CHECK_LOGS
  - CHECK_METRICS
  - TRACE_REQUEST
  - RESTART_SERVICE
  - SCALE_UP
  - ROLLBACK
  - FAILOVER_DB
  - CLEAR_CACHE
  - DIAGNOSE
  - ESCALATE

services:
  - api_gateway
  - auth
  - database
  - cache
  - queue
  - payment
  - notification
  - cdn

observation_fields:
  - alerts
  - service_statuses
  - logs
  - step
  - max_steps
  - incident_id

reward_range: [-10.0, 10.0]
episode_reward_range: [0.0, 1.0]

runtime:
  language: python
  version: "3.12"
  server_port: 7860
  max_memory_gb: 8
  max_vcpus: 2
